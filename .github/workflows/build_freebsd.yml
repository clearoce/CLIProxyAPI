name: Build for FreeBSD

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # 建议使用最新的稳定版本

      - name: Build for FreeBSD
        run: |
          # 关键点：进入 cmd/server 目录进行编译，并将输出文件移回根目录
          cd cmd/server && CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build -ldflags="-s -w" -o ../../CLIProxyAPI-freebsd-amd64 .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CLIProxyAPI-freebsd-amd64
          path: CLIProxyAPI-freebsd-amd64
