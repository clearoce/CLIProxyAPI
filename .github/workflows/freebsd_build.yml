name: Build FreeBSD Binary

on:
  workflow_dispatch: # 允许你在 Actions 页面点击“Run workflow”手动触发
  push:
    tags:
      - 'v*' # 当你推送 v 开头的 tag 时自动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # 使用项目要求的 Go 版本

      - name: Build for FreeBSD
        run: |
          # 关键步骤：使用交叉编译指令
          GOOS=freebsd GOARCH=amd64 go build -ldflags="-s -w" -o CLIProxyAPI-freebsd-amd64 .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CLIProxyAPI-freebsd-amd64
          path: CLIProxyAPI-freebsd-amd64
